<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>上海中学互动式探索系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            overflow: hidden;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #333; 
        }

        /* --- 导航 UI 样式 --- */
        #nav-container {
            position: absolute;
            top: 60px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #3498db;
        }

        .nav-btn:hover {
            transform: scale(1.1);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            fill: #3498db;
        }

        .nav-panel {
            margin-top: 15px;
            width: 260px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transform-origin: top left;
            transform: scale(0);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-height: 70vh;
            overflow-y: auto;
        }

        .nav-panel.active {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .nav-header {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-nav {
            cursor: pointer;
            font-size: 18px;
            color: #999;
        }

        .nav-info {
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
        }

        .nav-info p {
            margin: 4px 0;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            padding: 8px 10px;
            margin-bottom: 5px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item:hover {
            background: #e3f2fd;
            border-color: #3498db;
        }

        .nav-item.active-target {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }

        /*摇杆的部分 */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
        }

        .joystick-base {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: relative;
            backdrop-filter: blur(4px);
        }

        .joystick-stick {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            transition: transform 0.1s;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            user-select: none;
        }
        @media (min-width: 768px) {
            #joystick-zone {
                opacity: 0.3;
            }
        }
        
        /* 加载提示 */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        #loading small {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            color: #ccc;
            font-weight: normal;
        }

        /* --- 交互提示样式 --- */
        .interaction-prompt {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transform: translate(-50%, -100%);
            margin-top: -10px;
            z-index: 250;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .interaction-key {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 4px;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            pointer-events: auto;
            user-select: none;
        }

        .interaction-key:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 交互式的文本框 */
        #dialogue-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            z-index: 300;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            max-height: 60vh;
        }

        #dialogue-container.active {
            transform: translateY(0);
        }

        #dialogue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        #dialogue-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #dialogue-content {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex: 1;
            overflow-y: auto;
        }

        #dialogue-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #3498db;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid #fff;
        }
        
        #dialogue-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #dialogue-text {
            flex: 1;
            font-size: 16px;
            line-height: 1.5;
        }

        #dialogue-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 15px;
        }

        #dialogue-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            padding: 10px;
            color: white;
            font-size: 16px;
        }

        #dialogue-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        #dialogue-send {
            background: #3498db;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #dialogue-send:hover {
            background: #2980b9;
        }

        #voice-button {
            background: #e74c3c;
            border: none;
            border-radius: 4px;
            padding: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #voice-button:hover {
            background: #c0392b;
        }

        #voice-button.recording {
            background: #c0392b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div id="game-container">

        地图加载中...
        <small>请确保 map.png 在同一目录下</small>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <!--导航功能的部分 -->
    <div id="nav-container">

            </svg>

        </div>
    </div>

    <div id="controls-hint">
        电脑：W A S D 移动<br>
        手机：左下角摇杆移动<br>
        靠近建筑按E键交互<br>
        By 280574,280557
    </div>

    <div id="joystick-zone">
        <div class="joystick-base">
            <div class="joystick-stick" id="stick"></div>
        </div>
    </div>

    <!-- 交互提示 -->
    <div class="interaction-prompt" id="interaction-prompt">
        <span>按E和我聊天吧~</span>
        <div class="interaction-key" id="interaction-key">E</div>
    </div>
    
    <!-- 导航指引提示 -->
    <div class="navigation-hint" id="navigation-hint" style="
        position: absolute;
        top: 50%;
        left: 50%;

        font-size: 16px;
        z-index: 400;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
        max-width: 300px;
    ">
        <div style="font-size: 24px; margin-bottom: 10px;">🧭</div>
        <div id="navigation-hint-text">正在导航至...</div>
        <div id="navigation-hint-distance" style="font-size: 14px; color: #ccc; margin-top: 5px;">距离: 0m</div>
    </div>

    <!-- 对话文本框 -->
    <div id="dialogue-container">
        <div id="dialogue-header">
            <h3 id="dialogue-title">对话</h3>
            <button id="dialogue-close">&times;</button>
        </div>
        <div id="dialogue-content">
            <div id="dialogue-avatar">
                <img src="shs.jpg" 
                     alt="上海中学校徽" 
                     style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
            </div>
            <div id="dialogue-text">
                <p>你好。</p>
            </div>
        </div>
        <div id="dialogue-input-container">
            <input type="text" id="dialogue-input" placeholder="输入你的问题...">
            <button id="dialogue-send">发送</button>
            <button id="voice-button">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
    </div>
</div>

// 判断坐标
function pointInPolygon(px, py, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i][0], yi = poly[i][1];
        const xj = poly[j][0], yj = poly[j][1];
        const intersect = ((yi > py) !== (yj > py))
            && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}
window.addEventListener('resize', resize);
resize();
function initNavigation() {
    navListEl.innerHTML = '';
    buildings.forEach((b, index) => {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.innerHTML = `<span>${b.name}</span>`;
        li.onclick = () => setNavigationTarget(b, li);
        navListEl.appendChild(li);
    });

    navToggleBtn.onclick = () => {
        navPanel.classList.toggle('active');
    };
    navCloseBtn.onclick = () => {
        navPanel.classList.remove('active');
    };
}
function setNavigationTarget(building, listItem) {
    // 导航目标
    state.navigation.active = true;
    state.navigation.autoNavigating = true;
    state.navigation.target = {
        x: building.x + building.w / 2,
        y: building.y + building.h / 2,
        building: building
    };
    

    document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active-target');
    });
    if (listItem) {
        listItem.classList.add('active-target');
    }
    

    showNavigationHint(building);
    
    // 关闭导航面板
    navPanel.classList.remove('active');
}

function updateNavigation() {
    const p = state.player;
    const roundedX = Math.round(p.x);
    const roundedY = Math.round(p.y);
    
    if (navCoordsEl) {
        navCoordsEl.textContent = `${roundedX}, ${roundedY}`;
    }
    
    
    let nearestBuilding = null;
    let minDistance = Infinity;
    
    buildings.forEach(building => {
        const buildingCenterX = building.x + building.w / 2;
        const buildingCenterY = building.y + building.h / 2;
        const distance = Math.sqrt(
            Math.pow(p.x - buildingCenterX, 2) + 
            Math.pow(p.y - buildingCenterY, 2)
        );
        
        if (distance < minDistance) {
            minDistance = distance;
            nearestBuilding = building;
        }
    });
    
    
    if (navNearestEl && nearestBuilding) {
        navNearestEl.textContent = nearestBuilding.name;
    }
    
    
    if (state.navigation.active && state.navigation.target) {
        const target = state.navigation.target;
        const distanceToTarget = Math.sqrt(
            Math.pow(p.x - target.x, 2) + 
            Math.pow(p.y - target.y, 2)
        );
        
        if (distanceToTarget < 50) {
            
            showArrivalHint(target.building);
            
            
            state.navigation.active = false;
            state.navigation.target = null;
            state.navigation.autoNavigating = false;
            
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active-target');
            });
        } else if (state.navigation.autoNavigating) {
            
            const dx = target.x - p.x;
            const dy = target.y - p.y;
            const len = Math.sqrt(dx * dx + dy * dy);
            
            if (len > 0) {
                const moveSpeed = p.speed * 0.8; 
                p.x += (dx / len) * moveSpeed;
                p.y += (dy / len) * moveSpeed;
                
                
                if (Math.abs(dx) > 0.1) {
                    p.facingRight = dx > 0;
                }
                
                p.isMoving = true;
                p.walkCycle += 0.25;
            }
        }
    }
}


function handleRegularInput() {
    const p = state.player;
    
    let dx = 0;
    let dy = 0;

    if (state.keys.w) dy -= 1;
    if (state.keys.s) dy += 1;
    if (state.keys.a) dx -= 1;
    if (state.keys.d) dx += 1;

    if (Math.abs(state.input.x) > 0.1 || Math.abs(state.input.y) > 0.1) {
        dx = state.input.x;
        dy = state.input.y;
    }
    
    if ((dx !== 0 || dy !== 0) && state.navigation.autoNavigating) {
        state.navigation.autoNavigating = false;
        state.navigation.active = false;
        state.navigation.target = null;
        
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active-target');
        });
        
        const hintEl = document.getElementById('navigation-hint');
        const textEl = document.getElementById('navigation-hint-text');
        const distanceEl = document.getElementById('navigation-hint-distance');
        
        if (hintEl && textEl && distanceEl) {
            textEl.textContent = '导航已取消';
            distanceEl.textContent = '';
            hintEl.style.opacity = '1';
            
            setTimeout(() => {
                hintEl.style.opacity = '0';
            }, 2000);
        }
        
        
        return;
    }
    
    
    if (state.navigation.autoNavigating) {
        return;
    }

    if (dx !== 0 || dy !== 0) {
        if (Math.abs(state.input.x) < 0.1 && Math.abs(state.input.y) < 0.1) {
            const len = Math.sqrt(dx*dx + dy*dy);
            dx /= len;
            dy /= len;
        }
        
        p.x += dx * p.speed;
        p.y += dy * p.speed;
        
        if (Math.abs(dx) > 0.1) {
            p.facingRight = dx > 0;
        }
        
        p.isMoving = true;
        p.walkCycle += 0.25; 
    } else {
        p.isMoving = false;
    }

    // 键 E
    if (state.keys.e && state.interaction.active && !state.interaction.dialogueOpen) {
        openDialogue(state.interaction.currentBuilding);
        state.interaction.dialogueOpen = true;
    }
    
    
    if (state.keys['escape'] && state.navigation.autoNavigating) {
        state.navigation.autoNavigating = false;
        state.navigation.active = false;
        state.navigation.target = null;
        
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active-target');
        });
        
        
        const hintEl = document.getElementById('navigation-hint');
        const textEl = document.getElementById('navigation-hint-text');
        const distanceEl = document.getElementById('navigation-hint-distance');
        
        if (hintEl && textEl && distanceEl) {
            textEl.textContent = '导航已取消';
            distanceEl.textContent = '';
            hintEl.style.opacity = '1';
            
            setTimeout(() => {
                hintEl.style.opacity = '0';
            }, 2000);
        }
    }
}

：摇杆

let joystickActive = false;
let joystickCenter = { x: 0, y: 0 };
const maxStickDist = 40; 

function handleJoystickStart(clientX, clientY) {
    const rect = joystickZone.getBoundingClientRect();
    joystickCenter = {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
    };
    joystickActive = true;
    handleJoystickMove(clientX, clientY);
}

function handleJoystickMove(clientX, clientY) {
    if (!joystickActive) return;

    let dx = clientX - joystickCenter.x;
    let dy = clientY - joystickCenter.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance > maxStickDist) {
        const ratio = maxStickDist / distance;
        dx *= ratio;
        dy *= ratio;
    }

    stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

    state.input.x = dx / maxStickDist;
    state.input.y = dy / maxStickDist;
}

function handleJoystickEnd() {
    joystickActive = false;
    state.input.x = 0;
    state.input.y = 0;
    stick.style.transform = `translate(-50%, -50%)`;
}

joystickZone.addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleJoystickStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

joystickZone.addEventListener('touchmove', (e) => {
    e.preventDefault();
    handleJoystickMove(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

joystickZone.addEventListener('touchend', (e) => {
    e.preventDefault();
    handleJoystickEnd();
});

joystickZone.addEventListener('mousedown', (e) => {
    handleJoystickStart(e.clientX, e.clientY);
});
window.addEventListener('mousemove', (e) => {
    if(joystickActive) handleJoystickMove(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => {
    if(joystickActive) handleJoystickEnd();
});


function checkInteraction() {
    const p = state.player;
    const interactionDistance = 100;
    
    state.interaction.active = false;
    state.interaction.currentBuilding = null;
    interactionPrompt.style.opacity = '0';
    
    
    for (const building of buildings) {
        const dx = p.x - building.x;
        const dy = p.y - building.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < interactionDistance) {
            state.interaction.active = true;
            state.interaction.currentBuilding = building;
            
            
            const screenX = building.x - state.camera.x;
            const screenY = building.y - state.camera.y - building.h / 2;
            
            interactionPrompt.style.left = `${screenX}px`;
            interactionPrompt.style.top = `${screenY}px`;
            interactionPrompt.style.opacity = '1';
            
            break;
        }
    }
}

function openDialogue(building) {
    if (!building || !building.npc) return;
    
    dialogueTitle.textContent = building.name;
    dialogueAvatar.textContent = building.npc.avatar;
    dialogueText.innerHTML = `<p>${building.npc.initialMessage}</p>`;
    dialogueContainer.classList.add('active');
    dialogueInput.focus();
}

function closeDialogue() {
    dialogueContainer.classList.remove('active');
    state.interaction.dialogueOpen = false;
}

function calculateSimilarity(question, keywords, questions) {
    let score = 0;
    const lowerQuestion = question.toLowerCase();
    
    // 关键词匹配
    keywords.forEach(keyword => {
        if (lowerQuestion.includes(keyword.toLowerCase())) {
            score += 2; 
        }
    });
    
    // 问题匹配
    questions.forEach(q => {
        const lowerQ = q.toLowerCase();
        const words1 = lowerQuestion.split(/\s+|[.,!?，。！？]/);
        const words2 = lowerQ.split(/\s+|[.,!?，。！？]/);
        
        
        const intersection = words1.filter(word => words2.includes(word));
        const similarity = intersection.length / Math.sqrt(words1.length * words2.length);
        
        if (similarity > 0.3) {
            score += similarity * 5; 
        }
    });
    
    return score;
}


function findBestAnswer(question, dialogues) {
    let bestScore = 0;
    let bestAnswer = null;
    
    dialogues.forEach(dialogue => {
        const score = calculateSimilarity(question, dialogue.keywords, dialogue.questions);
        if (score > bestScore) {
            bestScore = score;
            bestAnswer = dialogue.answer;
        }
    });
    
    
    return bestScore > 1 ? bestAnswer : null;
}


function findSuggestedBuilding(question) {
    const buildingNames = Object.keys(dialogueDatabase);
    
    for (const buildingName of buildingNames) {
        const dialogues = dialogueDatabase[buildingName];
        const bestScore = dialogues.reduce((max, dialogue) => {
            const score = calculateSimilarity(question, dialogue.keywords, dialogue.questions);
            return Math.max(max, score);
        }, 0);
        
        if (bestScore > 2) {
            return buildingName;
        }
    }
    
    return null;
}

// 语音识别
let recognition = null;
let isRecording = false;

function initSpeechRecognition() {
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'zh-CN';
        
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            dialogueInput.value = transcript;
        };
        
        recognition.onend = function() {
            isRecording = false;
            voiceButton.classList.remove('recording');
            voiceButton.innerHTML = '<i class="fas fa-microphone"></i>';
        };
        
        recognition.onerror = function(event) {
            console.error('语音识别错误:', event.error);
            isRecording = false;
            voiceButton.classList.remove('recording');
            voiceButton.innerHTML = '<i class="fas fa-microphone"></i>';
        };
    } else {
        voiceButton.disabled = true;
        voiceButton.title = '您的浏览器不支持语音识别';
    }
}

function toggleSpeechRecognition() {
    if (!recognition) return;
    
    if (isRecording) {
        recognition.stop();
    } else {
        recognition.start();
        isRecording = true;
        voiceButton.classList.add('recording');
        voiceButton.innerHTML = '<i class="fas fa-stop"></i>';
    }
}


function update() {
    handleRegularInput();
    const p = state.player;
    updateNavigation();
    checkInteraction();
    
    p.x = Math.max(0, Math.min(mapWidth, p.x));
    p.y = Math.max(0, Math.min(mapHeight, p.y));
    
    if (!pointInPolygon(p.x, p.y, campusPolygon)) {
        
        p.x = state.navigation.lastValidX;
        p.y = state.navigation.lastValidY;
    } else {
      
        
        state.navigation.lastValidX = p.x;
        state.navigation.lastValidY = p.y;
    }
    
    state.camera.x = p.x - width / 2;
    state.camera.y = p.y - height / 2;
}

/**
 * 渲染函数
 */
function draw() {
    ctx.fillStyle = '#2c3e50'; 
    ctx.fillRect(0, 0, width, height);

    if (!mapLoaded) {
        requestAnimationFrame(loop);
        return;
    }

    ctx.save();
    ctx.translate(-state.camera.x, -state.camera.y);

    
    if (mapImage.complete && mapImage.naturalHeight !== 0) {
        ctx.drawImage(mapImage, 0, 0, mapWidth, mapHeight);
    } else {
        
        ctx.fillStyle = '#4caf50';
        ctx.fillRect(0, 0, mapWidth, mapHeight);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        for(let i=0; i<mapWidth; i+=100) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, mapHeight); ctx.stroke();
        }
        for(let i=0; i<mapHeight; i+=100) {
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(mapWidth, i); ctx.stroke();
        }
    }

    
    if (state.navigation.active && state.navigation.target) {
        const t = state.navigation.target;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.arc(t.x, t.y, 25, 0, Math.PI*2);
        ctx.stroke();
        ctx.setLineDash([]);
        
        const pulse = (Math.sin(Date.now() / 200) + 1) * 10;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 25 + pulse, 0, Math.PI*2);
        ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 4;
        ctx.fillText("目的地", t.x, t.y - 35);
        ctx.shadowBlur = 0;
    }

    // 角色
    drawStudent(state.player);

    ctx.restore();

    requestAnimationFrame(loop);
    
    ctx.fillStyle = '#fff';
    ctx.font = '16px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`X: ${Math.round(state.player.x)}  Y: ${Math.round(state.player.y)}`, 20, 30);
}

function drawStudent(p) {
    ctx.save();
    ctx.translate(p.x, p.y);

    const isFlipped = !p.facingRight;
    if (isFlipped) {
        ctx.scale(-1, 1);
    }

    const skinColor = '#ffccbc';
    const shirtColor = '#ffffff';
    const pantsColor = '#000080'; 
    const shoeColor = '#333333';
    const emblemRed = '#d32f2f';
    const emblemGold = '#ffd700';

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 28, 18, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    let legAngle = 0;
    let armAngle = 0;
    
    if (p.isMoving) {
        legAngle = Math.sin(p.walkCycle) * 0.5; 
        armAngle = Math.sin(p.walkCycle + Math.PI) * 0.4;
    }

    drawLeg(-3, legAngle, pantsColor, shoeColor, false);
    drawArm(-5, armAngle, skinColor, shirtColor, false);
    drawBody(shirtColor, pantsColor, skinColor, emblemRed, emblemGold, isFlipped);
    drawArm(5, -armAngle, skinColor, shirtColor, true);
    drawLeg(3, -legAngle, pantsColor, shoeColor, true);

    ctx.restore();
}

function drawBody(shirtColor, pantsColor, skinColor, emblemRed, emblemGold, isFlipped) {
    ctx.fillStyle = shirtColor;
    ctx.beginPath();
    ctx.moveTo(-9, -22);
    ctx.quadraticCurveTo(0, -15, 9, -22);
    ctx.lineTo(11, 8);
    ctx.quadraticCurveTo(0, 10, -11, 8);
    ctx.closePath();
    ctx.fill();
    
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.save();
    if (isFlipped) {
        ctx.scale(-1, 1);
    }
    
    const badgeX = -7; 
    const badgeY = -14;
    const badgeSize = 5;

    ctx.fillStyle = emblemRed;
    ctx.beginPath();
    ctx.arc(badgeX, badgeY, badgeSize, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.strokeStyle = emblemGold;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.strokeStyle = emblemGold;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(badgeX - 2, badgeY - 2);
    ctx.quadraticCurveTo(badgeX + 2, badgeY - 2, badgeX + 2, badgeY);
    ctx.quadraticCurveTo(badgeX + 2, badgeY + 2, badgeX - 2, badgeY + 2);
    ctx.stroke();

    ctx.restore();

    ctx.fillStyle = skinColor;
    ctx.beginPath();
    ctx.arc(0, -32, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(0, -33, 8, Math.PI, 0);
    ctx.lineTo(8, -33);
    ctx.lineTo(8, -29);
    ctx.lineTo(-8, -29);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(-3, -35, 2, 0, Math.PI*2);
    ctx.fill();
}

function drawLeg(xOffset, angle, color, shoeColor, isFront) {
    ctx.save();
    ctx.translate(xOffset, 8);
    ctx.rotate(angle);

    ctx.strokeStyle = color;
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 16);
    ctx.stroke();

    ctx.fillStyle = shoeColor;
    ctx.beginPath();
    ctx.ellipse(0, 18, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

function drawArm(xOffset, angle, skinColor, shirtColor, isFront) {
    ctx.save();
    ctx.translate(xOffset, -18);
    ctx.rotate(angle);

    ctx.strokeStyle = shirtColor;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 14);
    ctx.stroke();

    ctx.fillStyle = skinColor;
    ctx.beginPath();
    ctx.arc(0, 16, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}


let navigationHintTimeout;
function showNavigationHint(building) {
    const hintEl = document.getElementById('navigation-hint');
    const textEl = document.getElementById('navigation-hint-text');
    const distanceEl = document.getElementById('navigation-hint-distance');
    
    if (hintEl && textEl && distanceEl) {
        textEl.textContent = `正在导航至: ${building.name}`;
        distanceEl.textContent = ''; 
        
        hintEl.style.opacity = '1';
        
        
        if (navigationHintTimeout) {
            clearTimeout(navigationHintTimeout);
        }
        
        
        navigationHintTimeout = setTimeout(() => {
            hintEl.style.opacity = '0';
        }, 3000);
    }
}


let arrivalHintTimeout;
function showArrivalHint(building) {
    const hintEl = document.getElementById('navigation-hint');
    const textEl = document.getElementById('navigation-hint-text');
    const distanceEl = document.getElementById('navigation-hint-distance');
    
    if (hintEl && textEl && distanceEl) {
        textEl.textContent = `已到达: ${building.name}`;
        distanceEl.textContent = '按E键开始对话';
        
        
        hintEl.style.opacity = '1';
        
        
        if (arrivalHintTimeout) {
            clearTimeout(arrivalHintTimeout);
        }
        
        
        arrivalHintTimeout = setTimeout(() => {
            hintEl.style.opacity = '0';
        }, 4000);
    }
}


function initInteraction() {
    
    dialogueClose.addEventListener('click', closeDialogue);
    
    
    dialogueSend.addEventListener('click', handleDialogueSend);
    
    
    dialogueInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleDialogueSend();
        }
    });
    
    
    voiceButton.addEventListener('click', toggleSpeechRecognition);
    
    
    interactionKey.addEventListener('click', () => {
        if (state.interaction.active && !state.interaction.dialogueOpen) {
            openDialogue(state.interaction.currentBuilding);
            state.interaction.dialogueOpen = true;
        }
    });
    
    
    initSpeechRecognition();
}

function loop() {
    update();
    draw();
}

initNavigation();
initInteraction();
loop();
